<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CopyBot Orchestrator</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
</head>
<body>
  <header>
    <h1>CopyBot Orchestrator</h1>
    <div class="header-controls">
      <button id="btn-start-all" class="btn btn-green">Start All Bots</button>
      <button id="btn-stop-all" class="btn btn-red">Stop All Bots</button>
    </div>
  </header>

  <main>
    <section id="comparison-table">
      <h2>Bot Comparison</h2>
      <table id="bots-table">
        <thead>
          <tr>
            <th>Bot</th>
            <th>Status</th>
            <th>Total PnL</th>
            <th>Win Rate</th>
            <th>Trades</th>
            <th>Open Pos</th>
            <th>Balance</th>
            <th>Today PnL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="bots-tbody"></tbody>
      </table>
    </section>

    <section id="pnl-chart-section">
      <h2>PnL Comparison</h2>
      <canvas id="pnl-chart" height="300"></canvas>
    </section>
  </main>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings: <span id="modal-bot-name"></span></h2>
        <button id="modal-close" class="modal-close-btn" title="Close">&times;</button>
      </div>
      <div id="modal-settings-body" class="modal-body"></div>
      <div class="modal-footer">
        <button id="btn-modal-save" class="btn btn-blue">Save Settings</button>
        <button id="btn-modal-cancel" class="btn btn-outline">Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
